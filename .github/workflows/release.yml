name: GitHub Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install
              run: npm ci

            - name: Validate
              run: npm run check

            - name: Package Chromium
              run: npm run zip

            - name: Package Firefox
              run: npm run zip:firefox

            - name: Generate checksums
              shell: bash
              run: |
                  cd apps/extension/.output
                  sha256sum *.zip > SHA256SUMS.txt

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      apps/extension/.output/*.zip
                      apps/extension/.output/SHA256SUMS.txt
                  generate_release_notes: true
