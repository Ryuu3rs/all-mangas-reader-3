name: CI

on:
    push:
        branches:
            - main
            - master
            - "rewrite/**"
    pull_request:

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install
              run: npm ci

            - name: Formatting
              run: npm run format:check

            - name: Typecheck
              run: npm run typecheck

            - name: Test
              run: npm run test

            - name: Build Chromium
              run: npm run build

            - name: Build Firefox
              run: npm run build:firefox

            - name: Upload builds
              uses: actions/upload-artifact@v4
              with:
                  name: extension-builds
                  path: apps/extension/.output/
                  retention-days: 14
