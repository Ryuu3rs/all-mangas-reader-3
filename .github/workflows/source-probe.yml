name: Source Probe

# Manual triage run: probe mirror candidates for anti-scrape posture + CMS and
# upload the report. Does not gate anything — informational.

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    probe:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Run probe
              env:
                  PROBE_STAMP: ${{ github.run_id }}
              run: node tooling/source-probe/probe.mjs

            - name: Upload report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: source-probe-report
                  path: tooling/source-probe/output/
                  retention-days: 30
