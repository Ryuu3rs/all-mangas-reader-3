name: PR Title

# Squash-merge titles become the commit messages release-please parses, so the
# PR title must follow Conventional Commits. This is the soft gate for the
# convention until commit-level linting is enforced.

on:
    pull_request_target:
        types:
            - opened
            - edited
            - reopened
            - synchronize

permissions:
    pull-requests: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Validate PR title
              uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      chore
                      docs
                      refactor
                      perf
                      test
                      ci
                      build
                      revert
